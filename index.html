<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme: apply saved theme/mode before first paint to prevent flash -->
    <link rel="stylesheet" href="/src/themes.css" />
    <meta name="theme-color" content="#1d4ed8" />
    <script>
      (function(){
        var t=localStorage.getItem('bsl-theme');
        var m=localStorage.getItem('bsl-color-mode');
        if(t&&t!=='deafaction')document.documentElement.setAttribute('data-theme',t);
        var dark=m==='dark'||(m!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches);
        if(dark)document.documentElement.setAttribute('data-dark','');
        // Compute theme-color from CSS variables
        var temp = document.createElement('div');
        temp.style.display = 'none';
        if(t&&t!=='deafaction') temp.setAttribute('data-theme', t);
        if(dark) temp.setAttribute('data-dark', '');
        document.documentElement.appendChild(temp);
        var style = getComputedStyle(temp);
        var color = style.getPropertyValue('--color-bg-header').trim();
        document.documentElement.removeChild(temp);
        if(color) document.querySelector('meta[name="theme-color"]').setAttribute('content', color);
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/emoji/48/waving-hand-emoji.png" />

    <!-- Primary meta -->
    <title>BSL Calendar</title>
    <meta name="description" content="A community calendar for BSL and Deaf events. Find accessible performances, social meetups, and more." />

    <!-- Open Graph (link previews in Slack, WhatsApp, etc.) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="BSL Calendar" />
    <meta property="og:description" content="A community calendar for BSL and Deaf events. Find accessible performances, social meetups, and more." />
    <meta property="og:locale"      content="en_GB" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="BSL Calendar" />
    <meta name="twitter:description" content="A community calendar for BSL and Deaf events." />

    <!-- Theme font systems -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:wght@400;500;700;800&family=Archivo:wght@400;500;600;700;800&family=Atkinson+Hyperlegible+Next:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Red+Hat+Display:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

name = "bsl-upload"
main = "src/worker.ts"
compatibility_date = "2024-01-01"

# Secrets (set via `wrangler secret put <NAME>`):
#   UPLOAD_SECRET        — bearer token the frontend sends to authenticate requests
#   R2_ACCESS_KEY_ID     — R2 API token Access Key ID
#   R2_SECRET_ACCESS_KEY — R2 API token Secret Access Key
#
# Create R2 API token at: Cloudflare Dashboard → R2 → API Tokens
# Scope to bucket "bslcalendar" with Object Read & Write
